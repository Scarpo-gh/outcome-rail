<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OutcomeRail public data, policy, receipt and evidence architecture">
    <defs><style>text{font-family:monospace}</style>
      <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width=".5"/></pattern>
    </defs>
    <rect width="1100" height="650" fill="url(#grid)"/>
    <!-- arrows first -->
    <g stroke-width="1.6" fill="none" marker-end="url(#arrow)">
      <line x1="165" y1="210" x2="250" y2="210" stroke="#94a3b8"/>
      <line x1="405" y1="210" x2="485" y2="210" stroke="#34d399"/>
      <line x1="630" y1="210" x2="710" y2="210" stroke="#a78bfa"/>
      <line x1="855" y1="210" x2="935" y2="210" stroke="#fbbf24"/>
      <line x1="558" y1="270" x2="558" y2="370" stroke="#34d399"/>
      <line x1="785" y1="270" x2="785" y2="370" stroke="#a78bfa"/>
      <line x1="558" y1="430" x2="558" y2="510" stroke="#64748b"/>
      <line x1="785" y1="430" x2="785" y2="510" stroke="#64748b"/>
    </g>
    <text x="207" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">market + outcome</text>
    <text x="445" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">public GET</text>
    <text x="670" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">visible book</text>
    <text x="895" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">receipt proof</text>
    <!-- external -->
    <rect x="30" y="175" width="135" height="70" rx="6" fill="#0f172a"/><rect x="30" y="175" width="135" height="70" rx="6" fill="rgba(30,41,59,.5)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="97" y="202" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">User / Agent</text><text x="97" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">market_id, outcome, size</text>
    <!-- public APIs boundary -->
    <rect x="230" y="115" width="425" height="190" rx="12" fill="rgba(251,191,36,.04)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/><text x="245" y="137" fill="#fbbf24" font-size="10" font-weight="600">PUBLIC POLYMARKET DATA — GET ONLY</text>
    <rect x="250" y="175" width="155" height="70" rx="6" fill="#0f172a"/><rect x="250" y="175" width="155" height="70" rx="6" fill="rgba(30,41,59,.5)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="327" y="202" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Gamma API</text><text x="327" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">outcome → token id</text>
    <rect x="485" y="175" width="145" height="70" rx="6" fill="#0f172a"/><rect x="485" y="175" width="145" height="70" rx="6" fill="rgba(30,41,59,.5)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="558" y="202" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">CLOB API</text><text x="558" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">book + timestamp + hash</text>
    <!-- engine -->
    <rect x="710" y="175" width="145" height="70" rx="6" fill="#0f172a"/><rect x="710" y="175" width="145" height="70" rx="6" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="782" y="198" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">OutcomeRail Core</text><text x="782" y="216" fill="#94a3b8" font-size="9" text-anchor="middle">VWAP + visible depth</text><text x="782" y="230" fill="#34d399" font-size="8" text-anchor="middle">PROCEED / REDUCE / BLOCK</text>
    <!-- verification -->
    <rect x="935" y="175" width="135" height="70" rx="6" fill="#0f172a"/><rect x="935" y="175" width="135" height="70" rx="6" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1002" y="202" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Receipt</text><text x="1002" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">SHA-256 verification</text>
    <!-- lower -->
    <rect x="450" y="370" width="215" height="60" rx="6" fill="#0f172a"/><rect x="450" y="370" width="215" height="60" rx="6" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="558" y="395" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Policy v1.1</text><text x="558" y="413" fill="#94a3b8" font-size="9" text-anchor="middle">freshness · spread · price gap</text>
    <rect x="680" y="370" width="210" height="60" rx="6" fill="#0f172a"/><rect x="680" y="370" width="210" height="60" rx="6" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="785" y="395" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Input Manifest</text><text x="785" y="413" fill="#94a3b8" font-size="9" text-anchor="middle">canonical provenance hash</text>
    <rect x="450" y="510" width="215" height="65" rx="6" fill="#0f172a"/><rect x="450" y="510" width="215" height="65" rx="6" fill="rgba(30,41,59,.5)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="558" y="536" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Execution Receipt</text><text x="558" y="554" fill="#94a3b8" font-size="9" text-anchor="middle">manifest hash + analysis hash</text>
    <rect x="680" y="510" width="210" height="65" rx="6" fill="#0f172a"/><rect x="680" y="510" width="210" height="65" rx="6" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="785" y="536" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Evidence Log</text><text x="785" y="554" fill="#94a3b8" font-size="9" text-anchor="middle">append-only local hash chain</text>
    <text x="30" y="625" fill="#fb7185" font-size="10" font-weight="600">BOUNDARY:</text><text x="105" y="625" fill="#94a3b8" font-size="10">No orders · no private credentials · no wallet/custody · no settlement in V1</text>
  </svg>
