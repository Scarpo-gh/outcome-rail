name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python 3.12 tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        # v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        # v5.6.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile core modules
        run: >-
          python -m py_compile
          analysis_manifest.py analysis_job.py arc_anchor.py evidence_log.py erc8183_execution.py
          outcomerail_engine.py policy.py polymarket_client.py receipt.py
          scripts/anchor_evidence.py scripts/arc_erc8183_dry_run.py scripts/demo_receipt.py scripts/verify_evidence.py

      - name: Run unit tests
        run: python -m pytest -q

  foundry:
    name: Foundry lifecycle tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        # v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Run Solidity lifecycle tests
        run: forge test -q
